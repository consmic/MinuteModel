input_csv: data/*_LoL_esports_match_data_from_OraclesElixir.csv
output_dir: artifacts
reports_dir: reports

primary_model: catboost
use_role_specific_draft_features: true
use_bag_of_champions_fallback: true
use_sparse_champion_indicator_features: false
use_pick_order_champion_features: true
use_series_game_number_feature: false
target_unit: seconds
rolling_window_size: 10
use_champion_scaling_features: false
use_extended_rolling_team_priors: true
use_draft_summary_features: true
use_draft_interaction_features: true
use_draft_conditional_behaviour_features: true
draft_conditional_min_samples: 5
run_feature_group_ablation: false
run_refinement_ablation: false
champion_scaling_method: avg_duration_delta
champion_scaling_smoothing: true
champion_scaling_min_samples: 20
champion_scaling_recency_weighting: false
champion_scaling_recency_half_life_days: 180
champion_scaling_patch_aware: true
run_champion_scaling_ablation: false
use_rolling_ckpm_prior: true

enable_quantile_regression: true
quantile_levels:
  - 0.1
  - 0.5
  - 0.9
quantile_enforce_non_crossing: true
volatility_threshold_quantiles:
  - 0.33
  - 0.67

train_fraction: 0.70
validation_fraction: 0.15
test_fraction: 0.15

random_seed: 42

catboost_iterations: 1600
catboost_early_stopping_rounds: 120
catboost_param_grid:
  - depth: 5
    learning_rate: 0.03
    l2_leaf_reg: 9.0
    bagging_temperature: 0.5
    random_strength: 1.0
  - depth: 6
    learning_rate: 0.05
    l2_leaf_reg: 3.0
    bagging_temperature: 0.0
    random_strength: 0.0

lgbm_param_grid:
  - n_estimators: 400
    learning_rate: 0.05
    num_leaves: 31
    min_child_samples: 20
    subsample: 0.9
    colsample_bytree: 0.9
  - n_estimators: 700
    learning_rate: 0.03
    num_leaves: 63
    min_child_samples: 30
    subsample: 0.85
    colsample_bytree: 0.85
  - n_estimators: 900
    learning_rate: 0.02
    num_leaves: 95
    min_child_samples: 40
    subsample: 0.8
    colsample_bytree: 0.8
