input_csv: data/*_LoL_esports_match_data_from_OraclesElixir.csv
output_dir: artifacts
reports_dir: reports

use_role_specific_draft_features: true
use_bag_of_champions_fallback: true
target_unit: seconds
rolling_window_size: 10
use_champion_scaling_features: false
use_rolling_ckpm_prior: true

train_fraction: 0.70
validation_fraction: 0.15
test_fraction: 0.15

random_seed: 42

lgbm_param_grid:
  - n_estimators: 400
    learning_rate: 0.05
    num_leaves: 31
    min_child_samples: 20
    subsample: 0.9
    colsample_bytree: 0.9
  - n_estimators: 700
    learning_rate: 0.03
    num_leaves: 63
    min_child_samples: 30
    subsample: 0.85
    colsample_bytree: 0.85
  - n_estimators: 900
    learning_rate: 0.02
    num_leaves: 95
    min_child_samples: 40
    subsample: 0.8
    colsample_bytree: 0.8
